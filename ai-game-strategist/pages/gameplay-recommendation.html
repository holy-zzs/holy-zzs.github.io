    <style id="theme-vars">
:root {
  /* === Base Background === */
  --ags-bg-base: #0a0814;
  --ags-bg-deep: #0d0b1a;
  --ags-bg-surface: #131124;
  --ags-bg-card: #181530;
  --ags-bg-card-hover: #1d1a3d;
  --ags-bg-elevated: #1f1b3a;

  /* === Primary Purple === */
  --ags-purple: #8b5cf6;
  --ags-purple-light: #a78bfa;
  --ags-purple-dark: #7c3aed;
  --ags-purple-glow: rgba(139, 92, 246, 0.4);

  /* === Pink / Magenta === */
  --ags-pink: #ec4899;
  --ags-pink-light: #f472b6;
  --ags-pink-glow: rgba(236, 72, 153, 0.35);

  /* === Cyan === */
  --ags-cyan: #06b6d4;
  --ags-cyan-light: #22d3ee;
  --ags-cyan-glow: rgba(6, 182, 212, 0.35);

  /* === Blue === */
  --ags-blue: #3b82f6;
  --ags-blue-light: #60a5fa;
  --ags-blue-glow: rgba(59, 130, 246, 0.35);

  /* === Gold / Amber === */
  --ags-gold: #f59e0b;
  --ags-gold-light: #fbbf24;
  --ags-gold-glow: rgba(245, 158, 11, 0.35);

  /* === Green === */
  --ags-green: #10b981;
  --ags-green-light: #34d399;
  --ags-green-glow: rgba(16, 185, 129, 0.35);

  /* === Text === */
  --ags-text-primary: #ffffff;
  --ags-text-secondary: #c4b8e8;
  --ags-text-muted: #8b80b5;
  --ags-text-dim: #5c5478;

  /* === Border === */
  --ags-border: rgba(139, 92, 246, 0.15);
  --ags-border-light: rgba(139, 92, 246, 0.08);
  --ags-border-active: rgba(139, 92, 246, 0.4);

  /* === Gradients === */
  --ags-gradient-purple-pink: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
  --ags-gradient-purple-cyan: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
  --ags-gradient-pink-purple: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
  --ags-gradient-blue-purple: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
  --ags-gradient-gold: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
  --ags-gradient-green: linear-gradient(135deg, #10b981 0%, #34d399 100%);
  --ags-gradient-dark: linear-gradient(180deg, #131124 0%, #0d0b1a 100%);

  /* === Shadows === */
  --ags-shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
  --ags-shadow-glow-purple: 0 0 20px rgba(139, 92, 246, 0.3);
  --ags-shadow-glow-pink: 0 0 20px rgba(236, 72, 153, 0.3);
  --ags-shadow-glow-cyan: 0 0 20px rgba(6, 182, 212, 0.3);

  /* === Typography === */
  --ags-font-sans: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --ags-font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;

  /* === Radius === */
  --ags-radius-sm: 6px;
  --ags-radius-md: 10px;
  --ags-radius-lg: 14px;
  --ags-radius-xl: 20px;
  --ags-radius-full: 9999px;

  /* === Semantic Aliases (required by fill-html-head.mjs) === */
  --ags-background: var(--ags-bg-base);
  --ags-foreground: var(--ags-text-primary);
  --ags-card: var(--ags-bg-card);
  --ags-primary: var(--ags-purple);
  --ags-primary-foreground: var(--ags-text-primary);
  --ags-muted: var(--ags-bg-surface);
  --ags-muted-foreground: var(--ags-text-muted);
  --ags-border-semantic: var(--ags-border);
  --ags-ring: var(--ags-purple);
  --ags-secondary: var(--ags-bg-elevated);
  --ags-secondary-foreground: var(--ags-text-secondary);
  --ags-accent: var(--ags-bg-surface);
  --ags-accent-foreground: var(--ags-text-secondary);
  --ags-destructive: var(--ags-pink);
  --ags-destructive-foreground: var(--ags-text-primary);
  --ags-popover: var(--ags-bg-elevated);
  --ags-popover-foreground: var(--ags-text-primary);
}
    </style>

  }
